<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Crypto Prices</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    table { border-collapse: collapse; width: 420px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f5f5f5; }
    .meta { margin-top: 12px; color: #555; font-size: 14px; }
    .error { margin-top: 12px; color: #b00020; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Today's Crypto Prices (Auto Update)</h1>

  <table>
    <thead>
      <tr>
        <th>Coin</th>
        <th>Price (USD)</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Bitcoin</td>
        <td id="btc">Loading...</td>
      </tr>
      <tr>
        <td>Ethereum</td>
        <td id="eth">Loading...</td>
      </tr>
    </tbody>
  </table>

  <div class="meta">
    Last updated: <span id="updated">-</span> |
    Refresh interval: <span id="interval">30</span>s
  </div>
  <div class="error" id="error"></div>

  <script>
    const API_URL =
  "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&precision=2";

    const btcEl = document.getElementById("btc");
    const ethEl = document.getElementById("eth");
    const updatedEl = document.getElementById("updated");
    const errorEl = document.getElementById("error");

    const REFRESH_SECONDS = 30; // 원하는 주기(초)로 바꾸면 됨

    function formatUSD(value) {
      // 68206 -> $68,206.00
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(value);
    }

    async function fetchPrices() {
      try {
        errorEl.textContent = "";
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        const btc = data?.bitcoin?.usd;
        const eth = data?.ethereum?.usd;

        if (typeof btc !== "number" || typeof eth !== "number") {
          throw new Error("Unexpected API response");
        }

        btcEl.textContent = formatUSD(btc);
        ethEl.textContent = formatUSD(eth);
        updatedEl.textContent = new Date().toLocaleString();
      } catch (err) {
        errorEl.textContent =
          "Failed to fetch prices. Try again later. (" + err.message + ")";
      }
    }

    // 첫 로드 즉시 실행 + 주기적으로 갱신
    fetchPrices();
    setInterval(fetchPrices, REFRESH_SECONDS * 1000);
  </script>
</body>
</html>
